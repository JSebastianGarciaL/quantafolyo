# ⚠️ LEGACY — ya no se usa. Desde ahora .streamlit/config.toml define
# ambos temas nativamente con [theme.light]/[theme.dark] y el selector
# real está en el menú Settings de la app. Este archivo se conserva solo
# como referencia de los valores hex originales.
#
# QuantαfolyΩ — Tema modo oscuro (frío)
# Instrucciones:
#   1. Crea la carpeta .streamlit/ dentro de portfoliolab_streamlit\ si no existe
#   2. Copia este archivo como:  .streamlit\config.toml
#   3. Reinicia la app con: streamlit run app.py

[theme]
base                    = "dark"
primaryColor            = "#97b261"
backgroundColor         = "#0B161E"
secondaryBackgroundColor = "#162e1a"
textColor               = "#D8D2C6"
font                    = "sans serif"
